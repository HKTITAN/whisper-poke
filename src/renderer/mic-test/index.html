<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <link rel="stylesheet" href="mic-test.css" />
    <title>Test microphone</title>
  </head>
  <body>
    <div class="pane">
      <h1>Microphone test</h1>
      <p class="hint">
        Speak into your mic. The bar below shows live input level and the
        waveform reflects what WhisperPoke will capture.
      </p>
      <div class="meter"><div class="meter-fill" id="meter-fill"></div></div>
      <canvas id="wave" width="380" height="64"></canvas>
      <div class="footer">
        <span class="status" id="status">Requesting microphone…</span>
        <button id="close">Done</button>
      </div>
    </div>
    <script src="mic-test.js" defer></script>
  </body>
</html>
