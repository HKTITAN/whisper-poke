<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <link rel="stylesheet" href="overlay.css" />
  </head>
  <body>
    <div class="wrap" id="wrap">
      <div class="halo" aria-hidden="true"></div>

      <div class="overlay" id="overlay">
        <!-- Morphing status glyph: a single SVG canvas whose paths fade in/out
             based on the wrap's state class. Feels like one living icon rather
             than separate swaps. Inspired by benji.org/morphing-icons-with-claude -->
        <div class="status" aria-hidden="true">
          <div class="status-halo"></div>
          <svg class="glyph" viewBox="0 0 24 24" width="22" height="22" fill="none"
               stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <!-- mic (voice recording) -->
            <g class="g g-mic">
              <rect x="10" y="3" width="4" height="10" rx="2" class="mic-cap"></rect>
              <path d="M7 11a5 5 0 0 0 10 0"></path>
              <path d="M12 16v4"></path>
              <path d="M9 20h6"></path>
            </g>
            <!-- screen (screen recording) -->
            <g class="g g-screen">
              <rect x="3" y="5" width="18" height="12" rx="2"></rect>
              <path d="M9 21h6M12 17v4"></path>
              <circle cx="18" cy="8" r="1" fill="currentColor" stroke="none" class="screen-rec-dot"></circle>
            </g>
            <!-- paper plane (sending) -->
            <g class="g g-plane">
              <path d="M4 12l16-8-6 18-4-8-6-2z"></path>
            </g>
            <!-- check (sent) -->
            <g class="g g-check">
              <polyline points="4 12 10 18 20 6" class="check-path"></polyline>
            </g>
            <!-- x (cancel / failed) -->
            <g class="g g-x">
              <line x1="6" y1="6" x2="18" y2="18"></line>
              <line x1="18" y1="6" x2="6" y2="18"></line>
            </g>
            <!-- idle dot (soft pulse before anything happens) -->
            <g class="g g-idle">
              <circle cx="12" cy="12" r="3" fill="currentColor" stroke="none"></circle>
            </g>
          </svg>
        </div>

        <div class="pill-body">
          <canvas class="wave" id="wave" width="260" height="36"></canvas>
          <div class="transcript" id="transcript" hidden>
            <span class="transcript-final" id="transcript-final"></span><span class="transcript-interim" id="transcript-interim"></span>
            <span class="transcript-caret">▍</span>
          </div>
        </div>

        <div class="timer" id="timer">0:00</div>
      </div>

      <div class="controls" id="controls" hidden>
        <button class="ctl-btn ctl-cancel" id="btn-cancel" title="Cancel (Esc)">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="6" y1="6" x2="18" y2="18"></line>
            <line x1="18" y1="6" x2="6" y2="18"></line>
          </svg>
          <span>Cancel</span>
        </button>
        <button class="ctl-btn ctl-send" id="btn-send" title="Send to Poke">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 12l16-8-6 18-4-8-6-2z"></path>
          </svg>
          <span>Send</span>
        </button>
      </div>

      <div class="caption" id="caption">
        Recording with <strong>Whisper Poke</strong>
      </div>
    </div>
    <script src="overlay.js" defer></script>
  </body>
</html>
